"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"A date string with format `Y-m-d`, e.g. `2011-05-23`."
scalar Date @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\Date")

"Sexo de la persona."
enum Sexo {
    Masculino
    Femenino
}

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Buscar una persona por su identificador."
    persona(
        "Buscar por clave primaria."
        id: ID @eq @rules(apply: ["required"])
    ): Persona @find

    "Listar personas paginadas."
    personas(
        "Filtrar por nombres. Acepta comodines SQL LIKE `%` y `_`."
        nombres: String @where(operator: "like")

        "Filtrar por apellidos. Acepta comodines SQL LIKE `%` y `_`."
        apellidos: String @where(operator: "like")

        "Filtrar por documento de identidad."
        documento_identidad: String @eq
    ): [Persona!]! @paginate(defaultCount: 10)

    "Find a single user by an identifying attribute."
    user(
        "Search by primary key."
        id: ID @eq @rules(apply: ["prohibits:email", "required_without:email"])

        "Search by email address."
        email: String @eq @rules(apply: ["prohibits:id", "required_without:id", "email"])
    ): User @find

    "List multiple users."
    users(
        "Filters by name. Accepts SQL LIKE wildcards `%` and `_`."
        name: String @where(operator: "like")
    ): [User!]! @paginate(defaultCount: 10)
}

type Mutation {
    "Crear una nueva persona."
    crearPersona(
        nombres: String! @rules(apply: ["required", "max:100"])
        apellidos: String! @rules(apply: ["required", "max:100"])
        documento_identidad: String! @rules(apply: ["required", "max:15"])
        sexo: Sexo!
        fecha_nacimiento: Date!
        celular: Int! @rules(apply: ["required", "integer", "min:0"])
    ): Persona @create

    "Actualizar una persona existente."
    actualizarPersona(
        id: ID! @rules(apply: ["required"])
        nombres: String @rules(apply: ["max:100"])
        apellidos: String @rules(apply: ["max:100"])
        documento_identidad: String @rules(apply: ["max:15"])
        sexo: Sexo
        fecha_nacimiento: Date
        celular: Int @rules(apply: ["integer", "min:0"])
    ): Persona @update

    "Eliminar una persona por su identificador."
    eliminarPersona(
        id: ID! @rules(apply: ["required"])
    ): Persona @delete
}

"Persona registrada en la agenda."
type Persona {
    "Clave primaria única."
    id: ID!

    "Nombres de la persona."
    nombres: String!

    "Apellidos de la persona."
    apellidos: String!

    "Documento de identidad."
    documento_identidad: String!

    "Sexo de la persona."
    sexo: Sexo!

    "Fecha de nacimiento."
    fecha_nacimiento: Date!

    "Número de celular."
    celular: Int!

    "Fecha de creación del registro."
    created_at: DateTime!

    "Fecha de la última actualización."
    updated_at: DateTime!
}

"Account of a person who uses this application."
type User {
    "Unique primary key."
    id: ID!

    "Non-unique name."
    name: String!

    "Unique email address."
    email: String!

    "When the email was verified."
    email_verified_at: DateTime

    "When the account was created."
    created_at: DateTime!

    "When the account was last updated."
    updated_at: DateTime!
}
